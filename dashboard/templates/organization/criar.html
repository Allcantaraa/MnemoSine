{% extends "global/base.html" %}

{% block content %}
<div class="org-form-container">
    <div class="form-card">
        <h1>Criar Organização</h1>
        <p class="subtitle">Configure sua organização e comece a gerenciar dashboards</p>

        <form method="POST" class="form-body">
            {% csrf_token %}

            <div class="form-group">
                <label for="name">Nome da Organização</label>
                <input type="text" id="name" name="name" placeholder="Ex: Minha Empresa" class="form-input" required>
            </div>

            <button type="submit" class="btn-primary btn-large">Criar Organização</button>
        </form>

        <p class="form-help">Após criar, você receberá um código para convidar colaboradores.</p>
    </div>
</div>

<style>
    .org-form-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 300px);
        padding: 2rem;
    }

    .form-card {
        background: white;
        padding: 2.5rem;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        max-width: 450px;
        width: 100%;
    }

    .form-card h1 {
        font-size: 1.8rem;
        margin-bottom: 0.5rem;
    }

    .subtitle {
        color: #6c757d;
        margin-bottom: 2rem;
        font-size: 0.95rem;
    }

    .form-body {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }

    .form-group label {
        font-weight: 600;
        color: #2c3e50;
        font-size: 0.95rem;
    }

    .form-input {
        padding: 0.85rem;
        border: 1px solid #dee2e6;
        border-radius: 6px;
        font-size: 1rem;
        transition: all 0.3s ease;
    }

    .form-input:focus {
        outline: none;
        border-color: #0066cc;
        box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
    }

    .btn-large {
        padding: 0.95rem;
        font-size: 1rem;
        font-weight: 600;
    }

    .form-help {
        text-align: center;
        color: #6c757d;
        font-size: 0.9rem;
        margin-top: 1rem;
    }

    @media (max-width: 600px) {
        .form-card {
            padding: 1.5rem;
        }

        .form-card h1 {
            font-size: 1.5rem;
        }
    }
</style>
{% endblock content %}
