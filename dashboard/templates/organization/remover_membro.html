{% extends "global/base.html" %}

{% block content %}
<div class="confirmation-container">
    <div class="confirmation-card">
        <div class="alert-icon">⚠️</div>

        <h1>Remover Membro</h1>
        <p class="alert-text">
            Tem certeza que deseja remover <strong>{{ membership.user.username }}</strong>?
        </p>

        <p class="info-text">
            Este usuário perderá acesso a todos os dashboards da organização.
        </p>

        <form method="POST" class="form-actions">
            {% csrf_token %}
            <button type="submit" class="btn-danger">Remover Membro</button>
            <a href="{% url 'listar_membros' %}" class="btn-secondary">Cancelar</a>
        </form>
    </div>
</div>

<style>
    .confirmation-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 300px);
        padding: 2rem;
    }

    .confirmation-card {
        background: white;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        max-width: 450px;
        width: 100%;
        text-align: center;
    }

    .alert-icon {
        font-size: 3rem;
        margin-bottom: 1rem;
    }

    .confirmation-card h1 {
        color: #dc3545;
        margin-bottom: 1rem;
    }

    .alert-text {
        background-color: #fff5f5;
        border-left: 4px solid #dc3545;
        padding: 1rem;
        margin-bottom: 1rem;
        color: #2c3e50;
        text-align: left;
    }

    .info-text {
        color: #6c757d;
        margin-bottom: 2rem;
        font-size: 0.95rem;
    }

    .form-actions {
        display: flex;
        gap: 1rem;
        flex-direction: column;
    }

    .btn-danger {
        background-color: #dc3545;
        color: white;
        padding: 0.85rem;
        border: none;
        border-radius: 6px;
        font-size: 1rem;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
    }

    .btn-danger:hover {
        background-color: #bb2d3b;
        box-shadow: 0 2px 8px rgba(220, 53, 69, 0.2);
    }

    .btn-secondary {
        background-color: #6c757d;
        color: white;
        padding: 0.85rem;
        border: none;
        border-radius: 6px;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        transition: all 0.3s ease;
    }

    .btn-secondary:hover {
        background-color: #5a6268;
    }

    @media (max-width: 600px) {
        .confirmation-card {
            padding: 1.5rem;
        }

        .confirmation-card h1 {
            font-size: 1.5rem;
        }
    }
</style>
{% endblock content %}
