<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        {% include "global/partials/_head.html" %}
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html, body {
                height: 100%;
            }

            body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
                background-color: #f5f6f7;
                color: #2c3e50;
            }

            .layout-wrapper {
                display: flex;
                min-height: 100vh;
            }

            /* Sidebar */
            header {
                position: fixed;
                left: 0;
                top: 0;
                width: 280px;
                height: 100vh;
                background: white;
                border-right: 1px solid #e9ecef;
                overflow-y: auto;
                z-index: 100;
            }

            /* Main Content Area */
            main {
                margin-left: 280px;
                width: calc(100% - 280px);
                min-height: 100vh;
                padding: 2rem;
                background-color: #f5f6f7;
            }

            .main-content {
                max-width: 1400px;
                margin: 0 auto;
            }

            h1, h2, h3 {
                color: #2c3e50;
            }

            .btn-primary {
                background-color: #0066cc;
                color: white;
                padding: 0.75rem 1.5rem;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                text-decoration: none;
                display: inline-block;
                font-weight: 500;
                transition: all 0.3s ease;
            }

            .btn-primary:hover {
                background-color: #0052a3;
                box-shadow: 0 2px 8px rgba(0, 102, 204, 0.2);
            }

            .form-input {
                width: 100%;
                padding: 0.75rem;
                border: 1px solid #dee2e6;
                border-radius: 8px;
                font-size: 1rem;
                font-family: inherit;
                transition: all 0.3s ease;
                background-color: white;
                color: #2c3e50;
                box-sizing: border-box; /* Garante que padding e border sejam incluídos na largura */
            }

            .form-input:focus {
                outline: none;
                border-color: #0066cc;
                box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
            }

            textarea.form-input {
                resize: vertical;
                min-height: 120px;
            }

            /* Mobile: Sidebar collapses */
            @media (max-width: 768px) {
                header {
                    width: 70px;
                }

                main {
                    margin-left: 70px;
                    width: calc(100% - 70px);
                    padding: 1rem;
                }

                main .main-content {
                    max-width: none;
                }
            }

            @media (max-width: 480px) {
                header {
                    width: 60px;
                }

                main {
                    margin-left: 60px;
                    width: calc(100% - 60px);
                    padding: 0.5rem;
                }
            }
        </style>
    </head>

<body>
    <div class="layout-wrapper">
        {% if user.is_authenticated %}
            <header>
                {% include "global/partials/_header.html" %}
            </header>
        {% endif %}

        <main>
            {% include "global/partials/_messages.html" %}

            <div class="main-content">
                {% block content %}{% endblock content %}
            </div>
        </main>
    </div>
</body>
</html>
