<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        {% include "global/partials/_head.html" %}
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html, body {
                height: 100%;
            }

            body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
                background-color: #f8f9fa;
                color: #2c3e50;
            }

            .layout-wrapper {
                display: flex;
                min-height: 100vh;
            }

            body:not(.authenticated) .layout-wrapper {
                min-height: auto;
                height: auto;
            }

            /* Sidebar */
            header {
                position: fixed;
                left: 0;
                top: 0;
                width: 280px;
                height: 100vh;
                background: white;
                border-right: 1px solid #e9ecef;
                overflow-y: auto;
                z-index: 100;
            }

            /* Main Content Area */
            main {
                margin-left: 280px;
                width: calc(100% - 280px);
                min-height: 100vh;
                padding: 2rem;
                background-color: #f8f9fa;
                display: flex;
                flex-direction: column;
            }

            /* Se não houver autenticação, a main ocupa toda a tela */
            body:not(.authenticated) main {
                margin-left: 0;
                width: 100%;
                min-height: auto;
                padding: 0;
                background-color: transparent;
            }

            .main-content {
                max-width: 1400px;
                margin: 0 auto;
                width: 100%;
            }

            h1, h2, h3 {
                color: #2c3e50;
            }

            .btn-primary {
                background-color: #c92a2a;
                color: white;
                padding: 0.75rem 1.5rem;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                text-decoration: none;
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                font-weight: 600;
                transition: all 0.3s ease;
            }

            .btn-primary i {
                font-size: 0.9rem;
            }

            .btn-primary:hover {
                background-color: #a01c1c;
                box-shadow: 0 2px 8px rgba(201, 42, 42, 0.2);
            }

            .form-input {
                width: 100%;
                padding: 0.75rem;
                border: 1px solid #dee2e6;
                border-radius: 8px;
                font-size: 1rem;
                font-family: inherit;
                transition: all 0.3s ease;
                background-color: white;
                color: #2c3e50;
                box-sizing: border-box;
            }

            .form-input:focus {
                outline: none;
                border-color: #c92a2a;
                box-shadow: 0 0 0 3px rgba(201, 42, 42, 0.1);
            }

            textarea.form-input {
                resize: vertical;
                min-height: 120px;
            }

            /* FontAwesome Icons - Explicit Support */
            i[class*="fa-"] {
                display: inline-block;
                font-family: "Font Awesome 6 Free", "Font Awesome 6 Pro";
                font-weight: 900;
                font-style: normal;
                font-variant: normal;
                text-rendering: auto;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            i.fa-solid {
                font-family: "Font Awesome 6 Free";
                font-weight: 900;
            }

            i.fa-regular {
                font-family: "Font Awesome 6 Free";
                font-weight: 400;
            }

            i.fa-brands {
                font-family: "Font Awesome 6 Brands";
                font-weight: 400;
            }

            /* Mobile: Sidebar collapses */
            @media (max-width: 768px) {
                header {
                    width: 70px;
                }

                main {
                    margin-left: 70px;
                    width: calc(100% - 70px);
                    padding: 1rem;
                }

                main .main-content {
                    max-width: none;
                }
            }

            @media (max-width: 480px) {
                header {
                    width: 60px;
                }

                main {
                    margin-left: 60px;
                    width: calc(100% - 60px);
                    padding: 0.5rem;
                }
            }
        </style>
    </head>

<body {% if user.is_authenticated %}class="authenticated"{% endif %}>
    <div class="layout-wrapper">
        {% if user.is_authenticated %}
            <header>
                {% include "global/partials/_header.html" %}
            </header>
        {% endif %}

        <main>
            {% include "global/partials/_messages.html" %}

            <div class="main-content">
                {% block content %}{% endblock content %}
            </div>
        </main>
    </div>
</body>
</html>
