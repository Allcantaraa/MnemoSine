{% load org_tags %}

<nav class="sidebar">
    <!-- Brand with Logo -->
    <div class="sidebar-brand">
        <img src="https://storage.googleapis.com/flowbix-img/LogoFBX_noBck.png" alt="Flowbix" class="brand-logo-img">
        <div class="brand-text">MnemoSine</div>
    </div>

    <!-- Organization Selector as Navigation Item -->
    <div class="org-selector-nav">
        <form method="POST" action="{% url 'selecionar_organizacao' %}" class="org-form">
            {% csrf_token %}
            {% if request.user.organizationmember_set.all %}
                <select name="organization" class="org-select" onchange="this.form.submit()">
                    {% for org_member in request.user.organizationmember_set.all %}
                        <option value="{{ org_member.organization.slug }}" {% if request.organization == org_member.organization %}selected{% endif %}>
                            {{ org_member.organization.name }}
                        </option>
                    {% endfor %}
                </select>
            {% else %}
                <select class="org-select" disabled>
                    <option>Sem organização</option>
                </select>
            {% endif %}
        </form>
    </div>

    <!-- Navigation Links -->
    <div class="sidebar-nav">
        <a href="{% url 'index' %}" class="nav-link {% if request.resolver_match.url_name == 'index' %}active{% endif %}">
            <span class="nav-label">Início</span>
        </a>

        {% if request.organization %}
            {% if request.user|has_org_role:request.organization %}
                <a href="{% url 'listar_membros' %}" class="nav-link {% if request.resolver_match.url_name == 'listar_membros' %}active{% endif %}">
                    <span class="nav-label">Membros</span>
                </a>
            {% endif %}
        {% else %}
            <a href="{% url 'entrar_organizacao' %}" class="nav-link">
                <span class="nav-label">Entrar na Org</span>
            </a>
            <a href="{% url 'criar_organizacao' %}" class="nav-link">
                <span class="nav-label">Criar Org</span>
            </a>
        {% endif %}
    </div>

    <!-- Bottom Section -->
    <div class="sidebar-bottom">
        <a href="{% url 'perfil' %}" class="nav-link {% if request.resolver_match.url_name == 'perfil' %}active{% endif %}">
            <span class="nav-label">Perfil</span>
        </a>
        <a href="{% url 'logout' %}" class="nav-link logout-link">
            <span class="nav-label">Sair</span>
        </a>
    </div>
</nav>

<style>
    .sidebar {
        display: flex;
        flex-direction: column;
        height: 100%;
        background: white;
        padding: 1.5rem 1rem;
        gap: 1.5rem;
    }

    /* Brand */
    .sidebar-brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding-bottom: 1rem;
        border-bottom: 2px solid #f5f5f5;
    }

    .brand-logo-img {
        height: 40px;
        width: auto;
        object-fit: contain;
    }

    .brand-text {
        font-weight: 700;
        font-size: 1rem;
        color: #2c3e50;
        letter-spacing: -0.4px;
    }

    /* Organization Selector */
    .org-selector-nav {
        padding: 0.75rem;
        border-radius: 8px;
        background: #fafafa;
        border: 1px solid #e9ecef;
    }

    .org-form {
        margin: 0;
    }

    .org-select {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #ced4da;
        border-radius: 6px;
        background-color: white;
        font-size: 0.9rem;
        color: #495057;
        cursor: pointer;
        font-weight: 500;
    }

    .org-select:hover:not(:disabled) {
        border-color: #c92a2a;
    }

    .org-select:focus {
        border-color: #c92a2a;
        box-shadow: 0 0 0 3px rgba(201, 42, 42, 0.1);
        outline: none;
    }

    .org-select:disabled {
        background-color: #f5f5f5;
        color: #999;
        cursor: not-allowed;
    }

    /* Navigation */
    .sidebar-nav {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        flex: 1;
    }

    .nav-link {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem 0.75rem;
        color: #6c757d;
        text-decoration: none;
        border-radius: 8px;
        transition: all 0.3s ease;
        font-size: 0.9rem;
        font-weight: 500;
        border-left: 3px solid transparent;
    }

    .nav-label {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .nav-link:hover {
        background-color: #f5f5f5;
        color: #c92a2a;
    }

    .nav-link.active {
        color: #c92a2a;
        background-color: #ffe6e6;
        border-left-color: #c92a2a;
    }

    .nav-link.logout-link:hover {
        background-color: #fff5f5;
        color: #dc3545;
    }

    /* Bottom Section */
    .sidebar-bottom {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        padding-top: 1rem;
        border-top: 1px solid #e9ecef;
    }

    /* Mobile: Collapsed View */
    @media (max-width: 768px) {
        .sidebar {
            padding: 1rem 0.5rem;
            gap: 1rem;
        }

        .sidebar-brand {
            padding-bottom: 0.75rem;
        }

        .brand-text {
            display: none;
        }

        .brand-logo-img {
            height: 35px;
        }

        .org-selector-nav {
            padding: 0.5rem;
        }

        .org-select {
            font-size: 0.8rem;
            padding: 6px 10px;
        }

        .nav-label {
            display: none;
        }

        .nav-link {
            justify-content: center;
        }

        .sidebar-bottom {
            padding-top: 0.75rem;
        }
    }

    @media (max-width: 480px) {
        .sidebar {
            padding: 0.75rem 0.25rem;
        }

        .brand-logo-img {
            height: 32px;
        }

        .nav-link {
            padding: 0.6rem;
        }
    }
</style>
