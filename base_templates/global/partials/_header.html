{% load org_tags %}

<nav class="sidebar">
    <!-- Brand -->
    <div class="sidebar-brand">
        <div class="brand-logo">MnemoSine</div>
    </div>

    <!-- Organization Selector -->
    <div class="org-selector">
        <form method="POST" action="{% url 'selecionar_organizacao' %}" class="org-form">
            {% csrf_token %}
            <label for="organization-select" class="sr-only">Selecionar Organização</label>
            <select name="organization" id="organization-select" class="form-input" onchange="this.form.submit()">
                {% if not request.organization %}
                    <option value="" disabled selected>Nenhuma organização</option>
                {% endif %}
                {% for org_member in user.organizationmember_set.all %}
                    <option value="{{ org_member.organization.slug }}" {% if request.organization == org_member.organization %}selected{% endif %}>
                        {{ org_member.organization.name }}
                    </option>
                {% empty %}
                    {% if not request.organization %}
                        <option value="" disabled selected>Criar ou entrar em uma organização</option>
                    {% endif %}
                {% endfor %}
            </select>
        </form>
    </div>

    <!-- Navigation Links -->
    <div class="sidebar-nav">
        <a href="{% url 'index' %}" class="nav-link {% if request.resolver_match.url_name == 'index' %}active{% endif %}">
            <span class="nav-label">Início</span>
        </a>

        {% if request.organization %}
            {% if request.user|has_org_role:request.organization %}
                <a href="{% url 'listar_membros' %}" class="nav-link {% if request.resolver_match.url_name == 'listar_membros' %}active{% endif %}">
                    <span class="nav-label">Membros</span>
                </a>
            {% endif %}
        {% else %}
            <a href="{% url 'entrar_organizacao' %}" class="nav-link">
                <span class="nav-label">Entrar Org</span>
            </a>
            <a href="{% url 'criar_organizacao' %}" class="nav-link">
                <span class="nav-label">Criar Org</span>
            </a>
        {% endif %}
    </div>

    <!-- Bottom Section -->
    <div class="sidebar-bottom">
        <a href="{% url 'perfil' %}" class="nav-link">
            <span class="nav-label">Perfil</span>
        </a>
        <a href="{% url 'logout' %}" class="nav-link logout-link">
            <span class="nav-label">Sair</span>
        </a>
    </div>
</nav>

<style>
    .sidebar {
        display: flex;
        flex-direction: column;
        height: 100%;
        background: white;
        padding: 1.5rem 1rem;
        gap: 1.5rem;
    }

    /* Brand */
    .sidebar-brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid #e9ecef;
    }

    .brand-logo {
        font-size: 1.2rem;
        color: #2c3e50;
        font-weight: bold;
    }

    .brand-text {
        font-weight: 700;
        font-size: 1rem;
        color: #2c3e50;
        letter-spacing: -0.4px;
    }

    /* Organization Selector */
    .org-selector {
        padding: 0.75rem;
        border-radius: 8px;
        background: #f8f9fa;
        border: 1px solid #e9ecef;
    }

    .org-form select {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #ced4da;
        border-radius: 6px;
        background-color: white;
        font-size: 0.9rem;
        color: #495057;
        cursor: pointer;
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
        background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23007bff%22%20d%3D%22M287%2C114.7L153.2%2C248.5c-4.1%2C4.1-9.6%2C6.2-15.3%2C6.2c-5.7%2C0-11.2-2.1-15.3-6.2L5.4%2C114.7C-1.8%2C107.5-1.8%2C95.2%2C5.4%2C88c7.2-7.2%2C18.9-7.2%2C26.1%2C0l106.6%2C106.6l106.6-106.6c7.2-7.2%2C18.9-7.2%2C26.1%2C0C294.2%2C95.2%2C294.2%2C107.5%2C287%2C114.7z%22%2F%3E%3C%2Fsvg%3E");
        background-repeat: no-repeat;
        background-position: right 10px top 50%;
        background-size: 12px;
    }

    .org-form select:focus {
        border-color: #007bff;
        box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
    }

    .org-form .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
    }

    /* Navigation */
    .sidebar-nav {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        flex: 1;
    }

    .nav-link {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem 0.75rem;
        color: #6c757d;
        text-decoration: none;
        border-radius: 8px;
        transition: all 0.3s ease;
        font-size: 0.9rem;
        font-weight: 500;
        border-left: 3px solid transparent;
    }

    .nav-link:hover {
        background-color: #f8f9fa;
        color: #d4af37;
    }

    .nav-link.active {
        color: #d4af37;
        background-color: #fef9f0;
        border-left-color: #d4af37;
    }

    .nav-link.logout-link:hover {
        background-color: #fff5f5;
        color: #dc3545;
    }

    /* Bottom Section */
    .sidebar-bottom {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        padding-top: 1rem;
        border-top: 1px solid #e9ecef;
    }

    /* Mobile: Collapsed View */
    @media (max-width: 768px) {
        .sidebar {
            padding: 1rem 0.5rem;
            gap: 1rem;
        }

        .sidebar-brand {
            padding-bottom: 0.75rem;
        }

        .brand-text {
            display: none;
        }

        .brand-logo {
            font-size: 1.3rem;
            margin: 0 auto;
        }

        .org-selector {
            padding: 0.5rem;
        }

        .org-form select {
            font-size: 0.8rem;
            padding: 6px 10px;
        }

        .nav-label {
            display: none;
        }

        .nav-icon {
            margin: 0 auto;
        }

        .nav-link {
            justify-content: center;
            padding: 0.75rem;
        }

        .sidebar-bottom {
            padding-top: 0.75rem;
        }
    }

    @media (max-width: 480px) {
        .sidebar {
            padding: 0.75rem 0.25rem;
        }

        .brand-logo {
            font-size: 1.2rem;
        }

        .nav-link {
            padding: 0.6rem;
        }
    }
</style>
